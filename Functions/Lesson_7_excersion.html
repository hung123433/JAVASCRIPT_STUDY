    function convertToFahrenheit(celsius) {
      const fahrenheit = (celsius * 9 / 5) + 32;
      return fahrenheit;
    }
    // console.log(convertToFahrenheit(25));

    function convertToCelsius(fahrenheit) {
      const celsius = (fahrenheit - 32) * 5 / 9;
      return celsius;
    }
    // console.log(convertToCelsius(86));

    function convertTemperature(degrees, unit) {
      if (unit === 'C') {
        console.log(`${convertToFahrenheit(degrees)}F`);
      } else if (unit === 'F') {
        console.log(`${convertToCelsius(degrees)}C`);
      }
    }

    function convertMilesToKm(length) {
      return length * 1.6;
    }

    function convertKmToMiles(length) {
      return length / 1.6;
    }

    function convertMilesToFeet(length) {
      return length * 5280;
    }

    function convertKmToFeet(length) {
      return length * 3281;
    }

    function convertLength(length, from, to) {
      if (from === 'miles' && to === 'km') {
        console.log(`${convertMilesToKm(length)}km`);
      } else if (from === 'km' && to === 'miles') {
        console.log(`${convertKmToMiles(length)}miles`);
      } else if (from === 'km' && to === 'km') {
        console.log(`${length}km`);
      } else if (from === 'miles' && to === 'ft') {
        console.log(`${convertMilesToFeet(length)}ft`);
      } else if (from === 'km' && to === 'ft') {
        console.log(`${convertKmToFeet(length)}ft`);
      } else if (from === to) {
        console.log(`Invalid unit: ${to}`);
      }
    }
  </script>
