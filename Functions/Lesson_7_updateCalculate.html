<!DOCTYPE html>
<html>

<head>
  <title>Calculator</title>
</head>

<body>
  <button onclick="
      updateCalculate('1');
  ">1</button>

  <button onclick="
    updateCalculate('2');
  ">2</button>

  <button onclick="
    updateCalculate('3');
  ">3</button>

  <button onclick="
    updateCalculate(' + ');
  ">+</button>

  <button onclick="
    calculator = eval(calculator);//Chuyen doi chuoi thanh phep toan
    console.log(calculator);
  ">=</button>

  <p>
    <button onclick="
      updateCalculate('4');     
    ">4</button>

    <button onclick="
      updateCalculate('5');  
    ">5</button>

    <button onclick="
      updateCalculate('6'); 
    ">6</button>

    <button onclick="
      updateCalculate(' - ');
    ">-</button>

    <button onclick="
      calculator = '';
      console.log('Reset success');
    ">Reset</button>
  </p>

  <p>
    <button onclick="
      updateCalculate('7'); 
    ">7</button>

    <button onclick="
      updateCalculate('8');
    ">8</button>

    <button onclick="
      updateCalculate('9');
    ">9</button>

    <button onclick="
      updateCalculate(' * ');
    ">*</button>

    <button onclick="
      updateCalculate(' / ');
    ">/</button>
  </p>

  <p>
    <button onclick="
      updateCalculate('0');
    ">0</button>

    <button onclick="
      updateCalculate('.');
    ">.</button>

    <button onclick="
      updateCalculate(' % ');
    ">%</button>
  </p>
  <script>
    let calculator = '';

    function updateCalculate(value) {
      calculator += value;
      console.log(calculator);
    }
  </script>
</body>

</html>
