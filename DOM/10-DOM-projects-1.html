<!DOCTYPE html>
<html>

<head>
  <title>DOM PROJECTS 1</title>
  <style>
    .subsribe-button {
      border: none;
      background-color: black;
      color: white;
      padding-top: 10px;
      padding-bottom: 10px;
      padding-left: 15px;
      padding-right: 15px;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
    }

    .is-subscribe {
      background-color: rgb(240, 240, 240);
      color: black;
    }
  </style>

<body>

  <p>YouTube Subscribe Button</p>
  <button onclick="
    subscribe();
  " class="js-subscribe-button subsribe-button">Subscribe</button>


  <p>Amazon Shipping Calculator</p>
  <input placeholder="Cost of order" class="js-cost-input" onkeydown="
    handleCostKeyDown(event);">
  <button onclick="
    calculatorTotal();

  ">Calculator</button>
  <p class="js-total-cost"></p>

  <script>
    function handleCostKeyDown(event) {
      if (event.key === 'Enter') {
        calculatorTotal();
      }
    }

    function calculatorTotal() {
      const inputElement = document.querySelector('.js-cost-input');
      let cost = Number(inputElement.value);

      if (cost < 40) {
        cost += 10;
      }

      document.querySelector('.js-total-cost').innerHTML = `$${cost.toFixed(2)}`;

    }

    function subscribe() {
      const buttonElement = document.querySelector('.js-subscribe-button');
      if (buttonElement.innerText === 'Subscribe') {
        buttonElement.innerHTML = 'Subscribed';
        buttonElement.classList.add('is-subscribe');
      } else {
        buttonElement.innerHTML = 'Subscribe';
        buttonElement.classList.remove('is-subscribe');
      }
    }


  </script>
</body>

</html>
